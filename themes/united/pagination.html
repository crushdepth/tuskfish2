<?php if (!empty($slots)): ?>
<nav aria-label="Page navigation">
  <ul class="pagination">
    <?php foreach ($slots as $slot): ?>
    <li class="page-item<?php echo $slot['isCurrent'] ? ' active' : ''; ?>">
      <a class="page-link" href="<?php echo xss($slot['url']); ?>"<?php echo $slot['isCurrent'] ? ' aria-current="page"' : ''; ?>><?php echo xss($slot['label']); ?></a>
    </li>
    <?php endforeach; ?>
  </ul>
</nav>
<?php endif; ?>
