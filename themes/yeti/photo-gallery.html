<?php declare(strict_types=1); ?>

<!-- Shared framed-thumbnail grid (Bootstrap). Expects $galleryItems (array of content objects). -->
<?php if (!empty($galleryItems)): ?>
<div class="row">
  <?php foreach ($galleryItems as $item): ?>
    <?php if (!$item->image()) continue; ?>
  <div class="col-lg-3 col-md-4 col-sm-6 col-12 mb-4">
    <a class="photo-frame" href="<?php echo xss($item->url()); ?>">
      <img class="img-thumbnail img-fluid" src="<?php echo $item->cachedImage(400); ?>"
        srcset="<?php echo $item->cachedImageSrcset([260, 400]); ?>"
        sizes="(min-width: 992px) 25vw, (min-width: 768px) 33vw, (min-width: 576px) 50vw, 100vw"
        loading="lazy" decoding="async"
        <?php if ($item->caption()): ?>
        alt="<?php echo xss($item->caption()); ?>" title="<?php echo xss($item->caption()); ?>">
        <?php else: ?>
        alt="<?php echo xss($item->title()); ?>">
        <?php endif; ?>
    </a>
  </div>
  <?php endforeach; ?>
</div>
<?php endif; ?>
