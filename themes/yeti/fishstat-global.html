    function pickUnit(data) {
        var allValues = [].concat(data.capture || [], data.aquaculture || []);
        var maxVal = Math.max.apply(null, allValues.concat([0]));

        if (maxVal >= 1e6) return { divisor: 1e6, label: 'Million tonnes (live weight)', suffix: 'M', decimals: 2 };
        if (maxVal >= 1e4) return { divisor: 1e3, label: 'Thousand tonnes (live weight)', suffix: 'K', decimals: 1 };
        return { divisor: 1, label: 'Tonnes (live weight)', suffix: '', decimals: 0 };
    }

    function scaleValues(arr, divisor) {
        return arr.map(function(v) { return v / divisor; });
    }

    function buildChart(data) {
        if (!data.labels || !data.labels.length) {
            chartSubtitle.textContent = 'No data available for this selection';
            if (chart) {
                chart.data.labels = [];
                chart.data.datasets = [];
                chart.update('none');
            }
            return;
        }

        var unit = pickUnit(data);
        var datasets = [];
        var stacked = showCapture && showAquaculture;

        if (showCapture) {
            datasets.push({
                label: 'Capture Fisheries',
                data: scaleValues(data.capture, unit.divisor),
                backgroundColor: 'rgba(20, 50, 120, 0.85)',
                borderColor: 'rgba(20, 50, 120, 1)',
                borderWidth: 1.5,
                fill: true,
                tension: 0.3,
                pointRadius: 0,
                pointHitRadius: 8,
                order: 1
            });
        }

        if (showAquaculture) {
            datasets.push({
                label: 'Aquaculture',
                data: scaleValues(data.aquaculture, unit.divisor),
                backgroundColor: 'rgba(140, 215, 70, 0.85)',
                borderColor: 'rgba(100, 180, 40, 1)',
                borderWidth: 1.5,
                fill: true,
                tension: 0.3,
                pointRadius: 0,
                pointHitRadius: 8,
                order: 2
            });
        }

        chartSubtitle.textContent = unit.label + ', ' + data.labels[0] + '–' + data.labels[data.labels.length - 1];

        if (chart) {
            chart.data.labels = data.labels;
            chart.data.datasets = datasets;
            chart.options.scales.y.stacked = stacked;
            chart.options.scales.x.stacked = stacked;
            chart.options.scales.y.title.text = unit.label;
            chart.options.scales.y.ticks.callback = function(v) {
                return unit.suffix ? v + unit.suffix : v.toLocaleString();
            };
            chart.options.plugins.tooltip.callbacks.label = function(ctx) {
                return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(unit.decimals) + unit.suffix + ' tonnes';
            };
            chart.options.plugins.tooltip.callbacks.footer = function(items) {
                if (items.length < 2) return '';
                var total = items.reduce(function(s, i) { return s + i.parsed.y; }, 0);
                return 'Total: ' + total.toFixed(unit.decimals) + unit.suffix + ' tonnes';
            };
            chart.update('none');
            return;
        }

        chart = new Chart(canvas.getContext('2d'), {
            type: 'line',
            data: { labels: data.labels, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                aspectRatio: 2.2,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        stacked: stacked,
                        grid: { display: false },
                        ticks: { maxTicksLimit: 15, font: { size: 12 } }
                    },
                    y: {
                        stacked: stacked,
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: unit.label,
                            font: { size: 13 }
                        },
                        ticks: {
                            font: { size: 12 },
                            callback: function(v) {
                                return unit.suffix ? v + unit.suffix : v.toLocaleString();
                            }
                        },
                        grid: { color: 'rgba(0,0,0,0.06)' }
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            usePointStyle: true,
                            pointStyle: 'rect',
                            padding: 20,
                            font: { size: 13 }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                return ctx.dataset.label + ': ' + ctx.parsed.y.toFixed(unit.decimals) + unit.suffix + ' tonnes';
                            },
                            footer: function(items) {
                                if (items.length < 2) return '';
                                var total = items.reduce(function(s, i) { return s + i.parsed.y; }, 0);
                                return 'Total: ' + total.toFixed(unit.decimals) + unit.suffix + ' tonnes';
                            }
                        }
                    }
                }
            }
        });
    }

    function updateTitle() {
        var base = currentCountry
            ? currentCountry + ' — Fisheries & Aquaculture Production'
            : 'Global Fisheries & Aquaculture Production';

        if (currentSpeciesName) {
            base += ' — ' + currentSpeciesName;
        }

        chartTitle.textContent = base;
    }

    function setActiveCountry(name) {
        currentCountry = name;
        updateTitle();
        searchInput.value = '';
        closeDropdown();

        if (name) {
            activeBadge.classList.add('visible');
            badgeText.textContent = name;
        } else {
            activeBadge.classList.remove('visible');
        }

        document.querySelectorAll('.flag-btn').forEach(function(btn) {
            var dbName = btn.dataset.dbname || btn.dataset.country;
            btn.classList.toggle('active', dbName === name);
        });
    }

    function showLoading() { loading.classList.add('active'); }
    function hideLoading() { loading.classList.remove('active'); }

    function fetchChartData(country, species) {
        showLoading();
        var c = country !== undefined ? country : currentCountry;
        var s = species !== undefined ? species : currentSpecies;
        var url = FISHSTAT_URL + '?action=chartdata&country=' + encodeURIComponent(c || '')
            + '&species=' + encodeURIComponent(s || '');

        fetch(url)
            .then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function(data) {
                if (data.error) throw new Error(data.error);
                currentData = data;
                setActiveCountry(data.country || '');
                setActiveSpecies(data.species || '');
                buildChart(data);
                hideLoading();
            })
            .catch(function(err) {
                console.warn('FishStat: failed to load chart data', err);
                chartSubtitle.textContent = 'Failed to load data — please try again';
                hideLoading();
            });
    }

    // Country autocomplete
    function renderDropdown(matches) {
        var query = searchInput.value.trim().toLowerCase();
        dropdown.innerHTML = '';

        if (!matches.length) {
            dropdown.innerHTML = '<div class="country-option" style="color:#999;cursor:default">No matches</div>';
            dropdown.classList.add('open');
            return;
        }

        matches.forEach(function(name, idx) {
            var div = document.createElement('div');
            div.className = 'country-option';
            div.dataset.index = idx;

            if (query) {
                var lower = name.toLowerCase();
                var pos = lower.indexOf(query);
                if (pos >= 0) {
                    div.innerHTML = escapeHtml(name.substring(0, pos))
                        + '<mark>' + escapeHtml(name.substring(pos, pos + query.length)) + '</mark>'
                        + escapeHtml(name.substring(pos + query.length));
                } else {
                    div.textContent = name;
                }
            } else {
                div.textContent = name;
            }

            div.addEventListener('mousedown', function(e) {
                e.preventDefault();
                fetchChartData(name);
            });
            dropdown.appendChild(div);
        });

        dropdown.classList.add('open');
        highlightIndex = -1;
    }

    function escapeHtml(str) {
        var d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    function closeDropdown() {
        dropdown.classList.remove('open');
        highlightIndex = -1;
    }

    function setActiveSpecies(code) {
        currentSpecies = code;
        speciesInput.value = '';
        closeSpeciesDropdown();

        if (code) {
            var match = speciesList.find(function(sp) { return sp.c === code; });
            currentSpeciesName = match ? match.n : code;
            activeSpeciesBadge.classList.add('visible');
            speciesBadgeText.textContent = currentSpeciesName;
        } else {
            currentSpeciesName = '';
            activeSpeciesBadge.classList.remove('visible');
        }

        updateTitle();
    }

    // Species autocomplete
    function closeSpeciesDropdown() {
        speciesDropdown.classList.remove('open');
        speciesHighlightIndex = -1;
    }

    function getFilteredSpecies() {
        var q = speciesInput.value.trim().toLowerCase();
        if (!q || q.length < 2) return [];
        return speciesList.filter(function(sp) {
            return sp.n.toLowerCase().indexOf(q) !== -1
                || sp.s.toLowerCase().indexOf(q) !== -1;
        }).slice(0, 20);
    }

    function highlightMatch(text, query) {
        var lower = text.toLowerCase();
        var pos = lower.indexOf(query);
        if (pos < 0) return escapeHtml(text);
        return escapeHtml(text.substring(0, pos))
            + '<mark>' + escapeHtml(text.substring(pos, pos + query.length)) + '</mark>'
            + escapeHtml(text.substring(pos + query.length));
    }

    function renderSpeciesDropdown(matches) {
        var query = speciesInput.value.trim().toLowerCase();
        speciesDropdown.innerHTML = '';

        if (speciesInput.value.trim().length < 2) {
            speciesDropdown.classList.remove('open');
            return;
        }

        if (!matches.length) {
            speciesDropdown.innerHTML = '<div class="species-option" style="color:#999;cursor:default">No matches</div>';
            speciesDropdown.classList.add('open');
            return;
        }

        matches.forEach(function(sp, idx) {
            var div = document.createElement('div');
            div.className = 'species-option';
            div.dataset.index = idx;

            var html = highlightMatch(sp.n, query);
            if (sp.s) {
                html += ' <span class="sci-name">(' + highlightMatch(sp.s, query) + ')</span>';
            }
            div.innerHTML = html;

            div.addEventListener('mousedown', function(e) {
                e.preventDefault();
                fetchChartData(undefined, sp.c);
            });
            speciesDropdown.appendChild(div);
        });

        speciesDropdown.classList.add('open');
        speciesHighlightIndex = -1;
    }

    speciesInput.addEventListener('input', function() {
        renderSpeciesDropdown(getFilteredSpecies());
    });

    speciesInput.addEventListener('focus', function() {
        if (speciesInput.value.trim().length >= 2) {
            renderSpeciesDropdown(getFilteredSpecies());
        }
    });

    speciesInput.addEventListener('blur', function() {
        setTimeout(closeSpeciesDropdown, 150);
    });

    speciesInput.addEventListener('keydown', function(e) {
        var items = speciesDropdown.querySelectorAll('.species-option[data-index]');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            speciesHighlightIndex = Math.min(speciesHighlightIndex + 1, items.length - 1);
            updateSpeciesHighlight(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            speciesHighlightIndex = Math.max(speciesHighlightIndex - 1, 0);
            updateSpeciesHighlight(items);
        } else if (e.key === 'Enter' && speciesHighlightIndex >= 0) {
            e.preventDefault();
            var matches = getFilteredSpecies();
            if (matches[speciesHighlightIndex]) {
                fetchChartData(undefined, matches[speciesHighlightIndex].c);
            }
        } else if (e.key === 'Escape') {
            closeSpeciesDropdown();
            speciesInput.blur();
        }
    });

    function updateSpeciesHighlight(items) {
        items.forEach(function(el, i) {
            el.classList.toggle('highlighted', i === speciesHighlightIndex);
        });
        if (items[speciesHighlightIndex]) {
            items[speciesHighlightIndex].scrollIntoView({ block: 'nearest' });
        }
    }

    speciesBadgeClear.addEventListener('click', function() {
        fetchChartData(undefined, '');
    });

    function getFilteredCountries() {
        var q = searchInput.value.trim().toLowerCase();
        if (!q) return countryList.slice(0, 20);
        return countryList.filter(function(c) {
            return c.toLowerCase().indexOf(q) !== -1;
        });
    }

    searchInput.addEventListener('input', function() {
        renderDropdown(getFilteredCountries());
    });

    searchInput.addEventListener('focus', function() {
        renderDropdown(getFilteredCountries());
    });

    searchInput.addEventListener('blur', function() {
        setTimeout(closeDropdown, 150);
    });

    searchInput.addEventListener('keydown', function(e) {
        var items = dropdown.querySelectorAll('.country-option[data-index]');
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            highlightIndex = Math.min(highlightIndex + 1, items.length - 1);
            updateHighlight(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            highlightIndex = Math.max(highlightIndex - 1, 0);
            updateHighlight(items);
        } else if (e.key === 'Enter' && highlightIndex >= 0 && items[highlightIndex]) {
            e.preventDefault();
            var matches = getFilteredCountries();
            if (matches[highlightIndex]) {
                fetchChartData(matches[highlightIndex]);
            }
        } else if (e.key === 'Escape') {
            closeDropdown();
            searchInput.blur();
        }
    });

    function updateHighlight(items) {
        items.forEach(function(el, i) {
            el.classList.toggle('highlighted', i === highlightIndex);
        });
        if (items[highlightIndex]) {
            items[highlightIndex].scrollIntoView({ block: 'nearest' });
        }
    }

    // Dataset toggles — at least one must remain checked
    function updateToggleState() {
        captureToggle.disabled = showCapture && !showAquaculture;
        aquacultureToggle.disabled = showAquaculture && !showCapture;
    }

    captureToggle.addEventListener('change', function() {
        showCapture = this.checked;
        updateToggleState();
        buildChart(currentData);
    });

    aquacultureToggle.addEventListener('change', function() {
        showAquaculture = this.checked;
        updateToggleState();
        buildChart(currentData);
    });

    // Reset
    resetBtn.addEventListener('click', function() {
        fetchChartData('', '');
    });

    badgeClear.addEventListener('click', function() {
        fetchChartData('', undefined);
    });

    // Member flags
    function buildFlags() {
        memberCountries.forEach(function(mc) {
            var btn = document.createElement('button');
            btn.className = 'flag-btn';
            btn.type = 'button';
            btn.dataset.country = mc.name;
            if (mc.dbName) btn.dataset.dbname = mc.dbName;
            btn.innerHTML = (flagSvgs[mc.iso2] || '') + '<span class="flag-tooltip">' + escapeHtml(mc.name) + '</span>';

            btn.addEventListener('click', function() {
                var name = mc.dbName || mc.name;
                if (currentCountry === name) {
                    fetchChartData('');
                } else {
                    fetchChartData(name);
                }
            });

            flagContainer.appendChild(btn);
        });
    }

    // Chart.js shrinks correctly but won't expand because the canvas's
    // inline pixel dimensions prevent the container from growing.
    // Clear them on window resize so the container can recalculate.
    window.addEventListener('resize', function() {
        if (!chart) return;
        canvas.style.width = '';
        canvas.style.height = '';
        chart.resize();
    });

    // Init
    buildFlags();
    buildChart(initialData);

    fetch(<?php echo \json_encode(\rtrim(TFISH_VENDOR_URL, '/') . '/chartjs/species.json'); ?>)
        .then(function(r) { return r.json(); })
        .then(function(data) { speciesList = data; })
        .catch(function(err) { console.warn('FishStat: failed to load species list', err); });
})();
</script>
