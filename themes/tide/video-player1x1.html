<?php declare(strict_types=1); ?>

<!-- Title and meta information -->
<h1 class="title"><?php echo xss($content->title()); ?></h1>
<p class="content-info">
  <span class="small">
    <?php echo xss($content->date()->format($viewModel->dateFormat())) . ' | '; ?>
    <?php echo xss($content->info()); ?>
  </span>
</p>

<?php if ($contentTags): ?>
<p class="content-tags small">
  <i class="icon-tag"></i>
  <?php
    $tags = [];
    foreach ($contentTags as $key => $value) {
      $tags[] = '<a href="?id=' . xss($key) . '">' . xss($value) . '</a>';
    }
    echo \implode(', ', $tags);
  ?>
</p>
<?php endif; ?>

<!-- Available video aspect ratios are ratio-1x1, ratio-4x3, ratio-1x1, ratio-21x9 -->
<?php if ($content->externalMedia()): ?>
<div class="ratio ratio-1x1 video-player">
  <iframe
    src="<?php echo xss($content->externalMedia()); ?>"
    title="<?php echo xss($content->title()); ?>"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
  </iframe>
</div>
<?php endif; ?>

<!-- Description -->
<div class="description">
  <?php if ($content->description()) echo $content->descriptionForDisplay(); ?>
</div>

<!-- Rights -->
<?php if ($content->rights()): ?>
<p class="rights"><?php echo xss($content->listRights()[$content->rights()]); ?></p>
<?php endif; ?>

<?php if (!empty($parent)) include_once('parent.html'); ?>
